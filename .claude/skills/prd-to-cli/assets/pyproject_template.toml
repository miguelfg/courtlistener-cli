[project]
name = "{PROJECT_NAME}"
version = "0.1.0"
description = "{DESCRIPTION}"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    {DEPENDENCIES}
]

[project.optional-dependencies]
dev = [
    {DEV_DEPENDENCIES}
]

[project.scripts]
{CONSOLE_SCRIPT} = "src.cli:cli"

[tool.setuptools.packages.find]
where = ["."]
include = ["src*"]

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"
