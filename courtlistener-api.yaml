openapi: 3.0.0
info:
  title: CourtListener REST API
  description: REST API for federal and state case law, PACER data, the searchable
    RECAP Archive, oral argument recordings and more. Provided by Free Law Project,
    a 501(c)(3) non-profit.
  version: '4.3'
  contact:
    name: Free Law Project
    url: https://free.law/
    email: support@freelawproject.org
  license:
    name: CC0 1.0 Universal
    url: https://creativecommons.org/publicdomain/zero/1.0/
servers:
- url: https://www.courtlistener.com/api/rest/v4
  description: Production API
