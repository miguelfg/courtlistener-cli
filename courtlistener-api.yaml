  /search:
    get:
      summary: List search
      tags:
      - Search
      operationId: list_search
      parameters: &id001
      - name: limit
        in: query
        description: Number of results per page
        schema:
          type: integer
          default: 20
      - name: offset
        in: query
        description: Pagination offset
        schema:
          type: integer
          default: 0
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
        '401':
          description: Unauthorized - Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Create search
      tags:
      - Search
      operationId: create_search
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Created successfully
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /search/{id}:
    get:
      summary: Get search details
      tags:
      - Search
      operationId: retrieve_search
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Unique identifier for search
