[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "courtlistener-client"
version = "1.0.0"
description = "Python CLI client for CourtListener REST API"
readme = "README.md"
license = {text = "CC0"}
authors = [
    {name = "Generated by api-to-cli skillset"}
]
requires-python = ">=3.8"
dependencies = [
    "httpx>=0.24.0",
    "click>=8.0.0",
    "pydantic>=2.0.0",
    "python-dotenv>=1.0.0",
    "openpyxl>=3.1.2",
]

[project.scripts]
courtlistener-cli = "src.cli:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["src*"]
